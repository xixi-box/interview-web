name: Deploy Portfolio

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies & Build
        run: |
          npm install -g pnpm
          pnpm install
          pnpm build

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com
          username: aliyun4384550071
          password: "wangshun817"

      - name: Build and Push Docker Image
        working-directory: resume
        run: |
          IMAGE_TAG=crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_portfolio:latest
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          script: |
            echo "Deploying Portfolio..."
            mkdir -p /home/ubuntu/wangshun-portfolio
            cd /home/ubuntu/wangshun-portfolio

            # 写入最新的 docker-compose.yml
            cat << 'EOF' > docker-compose.yml
            services:
              portfolio:
                image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/wangshun_portfolio:latest
                container_name: wangshun-portfolio
                restart: always
                ports:
                  - "80:80"
            EOF

            # 硬编码登录阿里云 (保证拉取权限)
            sudo docker login crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com -u aliyun4384550071 -p wangshun817
            sudo docker-compose pull
            sudo docker-compose up -d
            sudo docker image prune -f
            echo "Portfolio deployed successfully!"
